<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>My New Website</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <h1 class="logo">My New Website</h1>
        <nav class="nav">
          <a href="#about">About</a>
          <a href="#projects">Projects</a>
          <a href="#contact">Contact</a>
        </nav>
      </div>
    </header>

    <main>
      <section class="hero">
        <div class="container">
          <h2>Welcome!</h2>
          <p>This is the starting point for my personal website.</p>
          <button id="hero-button">Click me</button>
        </div>
      </section>

      <section id="about" class="section">
        <div class="container">
          <h3>About Me</h3>
          <p>Write a short bio about yourself here.</p>
        </div>
      </section>

      <section id="projects" class="section">
        <div class="container">
          <h3>Projects</h3>
          <ul class="project-list">
            <li>Add your first project here.</li>
          </ul>
        </div>
      </section>

      <section id="contact" class="section">
        <div class="container">
          <h3>Contact</h3>
          <p>You can add your email or contact form later.</p>
        </div>
      </section>
    </main>

    <footer class="site-footer">
      <div class="container">
        <p>&copy; <span id="year"></span> My New Website</p>
      </div>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
